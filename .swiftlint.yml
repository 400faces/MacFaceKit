# SwiftLint config — mirrors TermTile's policy so the whole 400faces design-system family lints the
# same way. Excludes generated build output + test fixtures; allows the short geometry names the
# Canvas-drawn glyphs use (px/py/cx). Production safety rules stay strict on shipped code.
excluded:
  - .build
  - Tests             # gate protects SHIPPED components; tests use terse local names legitimately
disabled_rules:
  - trailing_comma    # Swift 6.1 permits trailing commas; the code uses them in collection literals
identifier_name:
  min_length:
    warning: 1        # geometry/layout math uses single-letter names (x, y, cx, px, py)
    error: 1
